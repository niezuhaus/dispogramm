name: e2e tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      # Backend Setup
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Build Backend
        working-directory: apps/backend
        run: mvn package -pl backend -DskipTests

      - name: Start Java Backend
        working-directory: apps/backend
        run: |
          nohup java -jar backend/target/*.jar &
          sleep 15

      # Frontend Setup
      - name: Create config.private.ts
        run: |
          cat > apps/frontend/src/app/config.private.ts << 'TSEOF'
          export const config = {
            "fallBackend": "${{ secrets.FALL_BACKEND }}",
            "apiAuthName": "${{ secrets.API_AUTH_NAME }}",
            "apiAuthPwd": "${{ secrets.API_AUTH_PWD }}",
            "VAPID_PUBLIC_KEY": "${{ secrets.VAPID_PUBLIC_KEY }}",
            "lexOfficeApiKey": "${{ secrets.LEXOFFICE_API_KEY }}",
            "geoapifyApiKey": "${{ secrets.GEOAPIFY_API_KEY }}",
            "mapboxApiKey": "${{ secrets.MAPBOX_API_KEY }}"
          }
          TSEOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Node Dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: apps/frontend
        run: npx playwright install --with-deps

      # Playwright Tests
      - name: Run Playwright Tests
        working-directory: apps/frontend
        env:
          FALL_BACKEND: ${{ secrets.FALL_BACKEND }}
          API_AUTH_NAME: ${{ secrets.API_AUTH_NAME }}
          API_AUTH_PWD: ${{ secrets.API_AUTH_PWD }}
          GEOAPIFY_API_KEY: ${{ secrets.GEOAPIFY_API_KEY }}
          MAPBOX_API_KEY: ${{ secrets.MAPBOX_API_KEY }}
        run: npx playwright test

      # Upload Playwright Report
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 30
