apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ${jkube.namespace}
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: localhost:32000/backend
          imagePullPolicy: IfNotPresent
          ports: 
            - containerPort: 8080
          env:
            - name: SPRING_DATA_MONGODB_HOST
              value: mongodb
            - name: SPRING_DATA_MONGODB_PORT
              value: 27017